{% set name = "pygenutils" %}
{% set version = "17.1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv"

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=68.0
    - wheel
  run:
    - python >=3.10
    - pip
    # Core dependencies available in conda channels
    - numpy >=2.2.3
    - pandas >=2.2.3
    # Note: more_itertools, filewise and paramlib will be installed via pip during post-link

test:
  imports:
    - pygenutils
    - pygenutils.arrays_and_lists
    - pygenutils.audio_and_video
    - pygenutils.dictionaries
    - pygenutils.number_bases
    - pygenutils.operative_systems
    - pygenutils.sets_and_intervals
    - pygenutils.strings
    - pygenutils.time_handling
  commands:
    - python -c "import pygenutils; print(pygenutils.__version__)"

about:
  home: https://github.com/EusDancerDev/pygenutils
  license: MIT
  license_file: LICENSE
  summary: General-purpose Python utilities for strings, time, arrays, files, and system tasks
  description: |
    pygenutils bundles reusable helpers for text and datetime handling, list and array patterns,
    dictionaries, and light OS-oriented utilities, with NumPy and pandas where appropriate.
    It is a shared foundation for other EusDancerDev scientific and tooling libraries.
  doc_url: https://github.com/EusDancerDev/pygenutils#readme
  dev_url: https://github.com/EusDancerDev/pygenutils.git

extra:
  recipe-maintainers:
    - EusDancerDev 